name: in_class_8_group_partner
description: "Card Organizer App - SQLite Flutter Project"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 SQLite
  sqflite: ^2.0.3
  path: ^1.8.0
  path_provider: ^2.0.11

  # Optional / Bonus
  image_picker: ^0.8.6
  http: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # ✅ Card image assets
  assets:
    - assets/cards/